<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Senhas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Gerador de Senhas</h1>
      <p>Crie senhas fortes em segundos.</p>

      <div class="password-box">
        <input type="text" id="password" readonly placeholder="Sua senha aparecerá aqui" />
        <button id="copy">Copiar</button>
      </div>

      <label>Tamanho: <span id="length-value">12</span></label>
      <input type="range" id="length" min="6" max="32" value="12" />

      <div class="options">
        <label><input type="checkbox" id="uppercase" checked /> Letras maiúsculas</label>
        <label><input type="checkbox" id="numbers" checked /> Números</label>
        <label><input type="checkbox" id="symbols" checked /> Símbolos</label>
      </div>

      <button id="generate" class="generate-btn">Gerar senha</button>
      <p id="message" class="message"></p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
